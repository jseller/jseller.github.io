
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>jseller.blogspot.com</title>
    <style>
    
    html, body {
        height: 100%;
    }

    body {
        margin: 0;
        font-family: OpenSans, Helvetica, Arial;
        overflow: hidden;
    	background-position: center center;
		background-repeat: no-repeat;
  		background-attachment: fixed;
  		background-size: cover;
  		background-color: #464646;
    }
		

    a {
        color: #ffffff;
    }

    #info {
        position: absolute;
        width: 100%;
        color: #ffffff;
        padding: 5px;
        font-size: 35px;
        font-weight: bold;
        text-align: center;
        z-index: 1;
    }

    #menu {
        position: absolute;
        bottom: 40px;
        width: 100%;
        text-align: center;
    }

    #labels {
        position: absolute;
        top: 50px;
        width: 100%;
        text-align: center;
    }

    .element {
        width: 140px;
        height: 180px;
        box-shadow: 0px 0px 12px rgba(0,255,255,0.5);
        border: 1px solid rgba(127,255,255,0.25);
        text-align: center;
        cursor: default;
    }

    .element:hover {
        box-shadow: 0px 0px 12px rgba(0,255,255,0.75);
        border: 4px solid rgba(127,255,255,0.75);
    }

    .element .symbol {
        position: absolute;
        top: 40px;
        left: 0px;
        right: 0px;
        font-size: 16px;
        font-weight: bold;
        color: #000; 
        text-decoration: none;

        -webkit-filter: drop-shadow(0px 0px 20px rgba(0,255,255,0.95));
        -moz-filter: drop-shadow(0px 0px 20px rgba(0,255,255,0.95));
        -o-filter: drop-shadow(0px 0px 20px rgba(0,255,255,0.95));
        -ms-filter: drop-shadow(0px 0px 20px rgba(0,255,255,0.95));
        filter: drop-shadow(0px 0px 20px rgba(0,255,255,0.95));
    }

    .symbol:hover {
        text-decoration: underline;
    }

    .element .details {
        position: absolute;
        bottom: 15px;
        left: 0px;
        right: 0px;
        font-size: 12px;
        background: '#ffffff';
        color: rgba(127,255,255,0.75);
        -moz-border-radius: 5px;
        -webkit-border-radius: 5px;
        border-radius: 5px;
    }

    button {
        color: rgba(127,255,255,0.75);
        background: transparent;
        outline: 1px solid rgba(127,255,255,0.75);
        border: 0px;
        padding: 5px 10px;
        cursor: pointer;
    }
    button:hover {
        background-color: rgba(0,255,255,0.5);
		background: efefef;
    }
    button:active {
        color: #000000;
        background-color: rgba(0,255,255,0.75);
    }

    input.labelButton {
        color: rgba(0,0,255,1);
        background: transparent;
        outline: 1px solid rgba(0,0,255,0.5);
        border: 0px;
        padding: 5px 10px;
        cursor: pointer;
        font-size: 11px;
    }
    input.labelButton:hover {
        background-color: rgba(0,0,255,0.5);
        color: #FFFFFF;
    }

    .loader {
      border: 1px solid #f3f3f3;
      border-radius: 50%;
      border-top: 1px solid #3498db;
      width: 20px;
      height: 20px;
      -webkit-animation: spin 2s linear infinite; /* Safari */
      animation: spin 2s linear infinite;
    }

</style>
</head>
<body>


<div id="container"></div>
<div id="info" style="display: none;">notes on software development</div>
<div id='labels'>
</div>
<div id='menu'>
    <button id='feed'>jseller.blogspot.com</button>
    <button class='layout' style='display: none' id='table'>Table</button>
    <button class='layout' style='display: none' id='sphere'>Sphere</button>
    <button class='layout' style='display: none' id='helix'>Helix</button>
    <button class='layout' style='display: none' id='grid'>Grid</button>
</div>

<script src="https://code.jquery.com/jquery-3.3.1.min.js" crossorigin="anonymous"></script>

<script>

var camera, scene, renderer;
var controls;
var objects = [];
var targets = { table: [], sphere: [], helix: [], grid: [] };
var cards = [];
var totalRows;

function reset() {

    $('#labels').empty();
    $('#layout').empty();
    $('#container').empty();
    objects = [];
    targets = { table: [], sphere: [], helix: [], grid: [] };
    cards = [];
}

function showLabels(data) {
    var terms = [];
    $(data).find("category").each(function () { 
            var el = $(this);
            var label = el.attr('term');
            terms.push(label);
        });     
    var totals = {};
    terms.map( function (a) { if (a in totals) totals[a] ++; else totals[a] = 1; } );
    var button =$('<input/>').attr({
                type: 'button',
                class: 'labelButton',
                value: 'all'
                });
    $("#labels").append(button);
    for (var key in totals) {
        var tot = totals[key] - 1;
        var button =$('<input/>').attr({
                type: 'button',
                class: 'labelButton',
                value: key + ' ('+tot+')'
                });
        $("#labels").append(button);
    }
}

   /**
 * Randomize array element order in-place.
 * Using Durstenfeld shuffle algorithm.
 */
function shuffleArray(array) {
    for (var i = array.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = array[i];
        array[i] = array[j];
        array[j] = temp;
    }
}

var images = ['back1.jpg','back2.jpg','p1.jpg','p2.jpg','p3.jpg','p4.jpg','p5.jpg','p6.jpg','p7.jpg','p8.jpg','p9.jpg'];

function setPictureCards(data) {
    var hash = location.hash.replace('#', '');
    if (hash === 'pics') {
        for (i = 0; i < 30; i++) {
            for (var image in images) {
                var title = images[image];
                var card = {}
                card.title = "<a class='change-back' data-url='"+title+"'>"+title+"</a>";
                card.text = "<a class='change-back' data-url='"+title+"'><img src='images/"+title+"' width='130px'></a>";
                cards.push(card);                
            }
        }
    }
    shuffleArray(cards);
}

function setImageCards(data) {
    var max = cards.length;
    for (i = 0; i < 1; i++) {
        for (var image in images) {
            if (image > max) {
                return;
            }
            var title = images[image];
            var card = {}
            card.title = "<a class='change-back' data-url='"+title+"'>"+title+"</a>";
            card.text = "<a class='change-back' data-url='"+title+"'><img src='images/"+title+"' width='100px'></a>";
            cards.push(card);                
        }
    }
}

function startX(count) { 
    if (count == 1) 
        return 9; 
    if (count < 50) 
      return 9 - Math.floor(totalRows/2);
    return 3; 
};

function startY(count) { 
    if (count > 20) 
        return 3
    return 5; 
};

function setLayout(data) {
    var count = cards.length;
    totalRows = Math.ceil(Math.sqrt(cards.length));
    var start = startX(count);
    var end = start + totalRows;
    var x = start;
    var y = startY(count);
    for (var card in cards) {
        if (x == end) {
            x = start;
            y++;
        }
        x++;
        cards[card].x = x;
        cards[card].y = y;
    }
}

function display() {
    init();
    animate();
    $('#feed').hide();
    $('#info').show();
    $('.layout').show();
}

function initCards(label) {
    var labelUrl = typeof(label) == 'undefined' ? '': '-/'+label+'/';
    var feed = 'https://jseller.blogspot.com/feeds/posts/default/'+labelUrl+'?callback=?';
    $.get(feed, function(data) {
        reset();
        $('.title').show();
        showLabels(data);
        
        $(data).find("entry").each(function (index) {
                var el = $(this);
                var href = el.find('link[rel=alternate]').attr('href');
                var title = el.find('link[rel=alternate]').attr('title');
                var header = '<a href='+href+'>'+title+'</a><br/>';
                var text = el.find('summary').text().substring(0,75);
                var links = '<br/>labels: '
                el.find('category').each(function(){
                    var cl = $(this);
                    links += '<i>'
                    links += cl.attr('term');
                    links += '</i>&nbsp;'
                });
                var card = {}
                card.title = header;
                card.text = text;
                card.labels = labels;
                cards.push(card);                
            });

        setImageCards(data);
        setPictureCards(data);
        setLayout(data);
        display();
    }, 'jsonp');
}

function init() {

    camera = new THREE.PerspectiveCamera( 75, window.innerWidth / window.innerHeight, 1, 5000 );
    camera.position.z = 1000;
    scene = new THREE.Scene();

    cards.forEach((elem, index, array) => {
        var element = document.createElement( 'div' );
        element.className = 'element';
        var number = document.createElement( 'div' );
        number.className = 'symbol';
        number.innerHTML = elem.title;
        element.appendChild( number );
        var details = document.createElement( 'div' );
        details.className = 'details';
        details.innerHTML = elem.text;
        element.appendChild( details );
        var object = new THREE.CSS3DObject( element );
        object.position.x = Math.random() * 4000 - 2000;
        object.position.y = Math.random() * 4000 - 2000;
        object.position.z = Math.random() * 4000 - 2000;
        scene.add( object );
        objects.push( object );
        var object = new THREE.Object3D();
        object.position.x = ( elem.x * 140 ) - 1330;
        object.position.y = - ( elem.y * 180 ) + 990;
        targets.table.push( object );
    });
   
    // sphere
    var vector = new THREE.Vector3();
    for ( var i = 0, l = objects.length; i < l; i ++ ) {
        var phi = Math.acos( -1 + ( 2 * i ) / l );
        var theta = Math.sqrt( l * Math.PI ) * phi;
        var object = new THREE.Object3D();
        object.position.x = 800 * Math.cos( theta ) * Math.sin( phi );
        object.position.y = 800 * Math.sin( theta ) * Math.sin( phi );
        object.position.z = 800 * Math.cos( phi );
        vector.copy( object.position ).multiplyScalar( 2 );
        object.lookAt( vector );
        targets.sphere.push( object );
    }

    // helix
    var vector = new THREE.Vector3();
    for ( var i = 0, l = objects.length; i < l; i ++ ) {
        var phi = i * 0.175 + Math.PI;
        var object = new THREE.Object3D();
        object.position.x = 900 * Math.sin( phi );
        object.position.y = - ( i * 8 ) + 450;
        object.position.z = 900 * Math.cos( phi );
        vector.x = object.position.x * 2;
        vector.y = object.position.y;
        vector.z = object.position.z * 2;
        object.lookAt( vector );
        targets.helix.push( object );
    }

    // grid
    for ( var i = 0; i < objects.length; i ++ ) {
        var object = new THREE.Object3D();
        object.position.x = ( ( i % 5 ) * 400 ) - 800;
        object.position.y = ( - ( Math.floor( i / 5 ) % 5 ) * 400 ) + 800;
        object.position.z = ( Math.floor( i / 25 ) ) * 1000 - 2000;
        targets.grid.push( object );
    }

    renderer = new THREE.CSS3DRenderer();
    renderer.setSize( window.innerWidth, window.innerHeight );
    renderer.domElement.style.position = 'absolute';
    document.getElementById( 'container' ).appendChild( renderer.domElement );

    controls = new THREE.TrackballControls( camera, renderer.domElement );
    controls.rotateSpeed = 0.5;
    controls.addEventListener( 'change', render );

    var button = document.getElementById( 'table' );
    button.addEventListener( 'click', function ( event ) {
        transform( targets.table, 2000 );
    }, false );

    var button = document.getElementById( 'sphere' );
    button.addEventListener( 'click', function ( event ) {
        transform( targets.sphere, 2000 );
    }, false );

    var button = document.getElementById( 'helix' );
    button.addEventListener( 'click', function ( event ) {
        transform( targets.helix, 1000 );
    }, false );

    var button = document.getElementById( 'grid' );
    button.addEventListener( 'click', function ( event ) {
        transform( targets.grid, 2000 );
    }, false );

    transform( targets.table, 3000 );
    window.addEventListener( 'resize', onWindowResize, false );
}

function transform( targets, duration ) {
    TWEEN.removeAll();

    for ( var i = 0; i < objects.length; i ++ ) {
        var object = objects[ i ];
        var target = targets[ i ];
        new TWEEN.Tween( object.position )
                    .to( { x: target.position.x, y: target.position.y, z: target.position.z }, Math.random() * duration + duration )
                    .easing( TWEEN.Easing.Exponential.InOut )
                    .start();
        new TWEEN.Tween( object.rotation )
                    .to( { x: target.rotation.x, y: target.rotation.y, z: target.rotation.z }, Math.random() * duration + duration )
                    .easing( TWEEN.Easing.Exponential.InOut )
                    .start();
    }
    new TWEEN.Tween( this ).to( {}, duration * 2 ).onUpdate( render ).start();
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize( window.innerWidth, window.innerHeight );
    render();
}

function animate() {
    requestAnimationFrame( animate );
    TWEEN.update();
    controls.update();
}

function render() {
    renderer.render( scene, camera );
}


$('body').on('click', '.change-back', function() {
    var url = $(this).data('url');
    var attr = 'url(images/'+url+')';
    $('body').css('background-image', attr);
});

$('body').on('click', '.labelButton', function() {
    $("#labels").empty();
    $("#labels").html('Loading data...<div class="loader"></div>');
    var label = $(this).val();
    if (label == 'all') {
        initCards();
    }
    else {
        label = label.substring(0,label.indexOf(' '));
        initCards(label);
    }
});

$(document).ready(function () {
    $('#feed').html('Loading data...<div class="loader"></div>');
    initCards();
    $('body').css('background-image', 'url(images/back1.jpg)');
});


</script>
</body>
</html>
