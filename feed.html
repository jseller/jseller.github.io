<html>
<body>
	<button id='feed'>jseller.blogspot.com</button>
	<div id='terms'>
	</div>
	<div id='layout'>
	</div>
</body>
<script src="https://code.jquery.com/jquery-3.3.1.min.js" crossorigin="anonymous"></script>
<script>

var cards = [];

function buildCard(title, text, labels, x, y) {
	var card = {}
    card.title = title;
    card.text = text;
    card.labels = labels;
    card.x = x;
    card.y = y;
    return card;
}

$(document).ready(function() {
	$('#feed').click(function() {
		$('#terms').empty();
		$('#layout').empty();

		var feed = "https://jseller.blogspot.com/feeds/posts/default?callback=?";
		$.get(feed, function(data) {
			var terms = [];
			$(data).find("category").each(function () { 
					var el = $(this);
					var label = el.attr('term');
					terms.push(label);
    			});		
			var totals = {};
			terms.map( function (a) { if (a in totals) totals[a] ++; else totals[a] = 1; } );
			console.log(totals);
			for (var key in totals) {
				var button =$('<input/>').attr({
						type: 'button',
						class: 'labelButton',
						value: key + ' ('+totals[key]+')'
						});
				$("#terms").append(button);
			}
			var count = $(data).find('entry').length;
			var totalRows = Math.floor(Math.sqrt(count));
			var x = 1, y = 1;
			$(data).find("entry").each(function (index) {
					var idx = index + 1; 
					var el = $(this);
					var href = el.find('link[rel=alternate]').attr('href');
					var title = el.find('link[rel=alternate]').attr('title');
					var header = '<a href='+href+'>'+title+'</a><br/>';
					var text = el.find('summary').text();
					var links = '<br/>labels: '
					el.find('category').each(function(){
						var cl = $(this);
						links += '<i>'
						links += cl.attr('term');
						links += '</i>&nbsp;'
					});
					var entry = header+text+links;
					cards.push(buildCard(header,text,links,x,y));
					if (x == totalRows) {
						x = 0;
						y++;
					}
					x++;
					var card = $('<div>').append(entry);
					$('#layout').append(card);
				});
			console.log(cards);
		}, 'jsonp');
		
	});
});
</script>

</html>
